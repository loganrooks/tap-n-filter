# Codex code-review via openai/codex-action — opt-in workflow.
#
# Install by copying to .github/workflows/codex-review.yml in your repo and
# adding OPENAI_API_KEY as a repo secret. Does NOT depend on Codex Cloud
# (chatgpt.com Settings → Environments); pure API + Actions.
#
# References:
#   - tools/review-journal/install/codex-review-prompt.md  (prompt body)
#   - tools/review-journal/install/codex-review-schema.json (output schema)
#
# Note: PRs from forks will NOT have access to OPENAI_API_KEY (GitHub's
# standard secret-scoping for pull_request events). If you want fork-PR
# reviews, read the `pull_request_target` discussion in
# tools/review-journal/README.md before enabling it — that path has real
# security implications.

name: Codex review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  codex:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false)
      || (github.event_name == 'issue_comment'
          && github.event.issue.pull_request != null
          && contains(github.event.comment.body, '@codex review'))
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
    steps:
      - name: Resolve PR refs
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER='${{ github.event.pull_request.number }}'
          else
            PR_NUMBER='${{ github.event.issue.number }}'
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          BASE_SHA=$(gh api "repos/$GH_REPO/pulls/$PR_NUMBER" --jq '.base.sha')
          HEAD_SHA=$(gh api "repos/$GH_REPO/pulls/$PR_NUMBER" --jq '.head.sha')
          BASE_REF=$(gh api "repos/$GH_REPO/pulls/$PR_NUMBER" --jq '.base.ref')
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ steps.resolve.outputs.pr_number }}/merge
          persist-credentials: false
          fetch-depth: 0

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ steps.resolve.outputs.base_ref }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
        run: |
          git fetch --no-tags origin "$PR_BASE_REF" "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex
        id: run_codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          output-schema-file: tools/review-journal/install/codex-review-schema.json
          # Leave `model` and `effort` empty to use Codex's defaults. Pin a
          # cheaper model here for cost control on noisy PRs.
          # model: gpt-5.4-mini
          prompt: |
            You are reviewing pull request #${{ steps.resolve.outputs.pr_number }}
            on the ${{ github.repository }} repository.

            Base SHA: ${{ steps.resolve.outputs.base_sha }}
            Head SHA: ${{ steps.resolve.outputs.head_sha }}

            Read the diff with:
              git diff ${{ steps.resolve.outputs.base_sha }}..${{ steps.resolve.outputs.head_sha }}

            Read the commit history with:
              git log --oneline ${{ steps.resolve.outputs.base_sha }}..${{ steps.resolve.outputs.head_sha }}

            Follow the instructions in
            tools/review-journal/install/codex-review-prompt.md
            and produce JSON matching the schema at
            tools/review-journal/install/codex-review-schema.json.

  post_review:
    runs-on: ubuntu-latest
    needs: codex
    if: needs.codex.outputs.final_message != ''
    permissions:
      pull-requests: write
    steps:
      - name: Post review
        uses: actions/github-script@v7
        env:
          CODEX_FINAL_MESSAGE: ${{ needs.codex.outputs.final_message }}
          PR_NUMBER: ${{ needs.codex.outputs.pr_number }}
        with:
          github-token: ${{ github.token }}
          script: |
            const final = process.env.CODEX_FINAL_MESSAGE || "";
            const prNum = Number(process.env.PR_NUMBER);
            let parsed;
            try {
              parsed = JSON.parse(final);
            } catch (e) {
              // Codex returned non-JSON despite the output-schema. Post raw.
              const truncated = final.substring(0, 60000);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNum,
                body: `🤖 **Codex review** (non-JSON fallback)\n\n<details><summary>Raw output</summary>\n\n\`\`\`\n${truncated}\n\`\`\`\n\n</details>`,
              });
              return;
            }
            const findings = Array.isArray(parsed.findings) ? parsed.findings : [];
            // Inline comments need both path and a numeric line. Anything
            // that lacks them falls into the offline-findings block below.
            const inlineComments = findings
              .filter(f => f.path && Number.isInteger(f.line))
              .map(f => ({
                path: f.path,
                line: f.line,
                side: "RIGHT",
                body: `**${f.severity || "?"}** — ${f.title || ""}\n\n${f.body || ""}`,
              }));
            const offline = findings
              .filter(f => !f.path || !Number.isInteger(f.line))
              .map(f => `- **${f.severity || "?"}** — ${f.title || ""}\n  ${f.body || ""}`);
            const summary = parsed.summary || "(no summary returned)";
            const offlineBlock = offline.length
              ? "\n\n**Findings without a path/line:**\n\n" + offline.join("\n\n")
              : "";
            const header =
              "🤖 **Codex review** (via [openai/codex-action](https://github.com/openai/codex-action); reply with `review-verdict` blocks — see `docs/governance/review-protocol.md`)\n\n";
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNum,
                event: "COMMENT",
                body: header + summary + offlineBlock,
                comments: inlineComments,
              });
            } catch (err) {
              // pulls.createReview can fail if a comment references a path
              // not in the diff (Codex hallucinated a path). Fall back to a
              // top-level review with the findings serialized in the body.
              core.warning(`pulls.createReview failed: ${err.message}; posting summary only.`);
              const inlineFallback = inlineComments.length
                ? "\n\n**Inline findings** (posted as summary because review API rejected them):\n\n" +
                  inlineComments.map(c => `- \`${c.path}:${c.line}\`\n  ${c.body}`).join("\n\n")
                : "";
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNum,
                event: "COMMENT",
                body: header + summary + offlineBlock + inlineFallback,
              });
            }
