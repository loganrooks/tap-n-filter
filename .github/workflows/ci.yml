name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-test:
    name: Build and test
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Swift Package Manager)
        run: swift build -c debug

      - name: Test
        run: swift test -c debug --enable-code-coverage

  # Integration tests are gated behind a workflow_dispatch trigger because
  # they require real Core Audio devices and are slow on the CI runner.
  integration-tests:
    name: Integration tests (manual)
    runs-on: macos-14
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Run integration tests
        env:
          RUN_INTEGRATION_TESTS: "1"
        run: swift test -c debug --filter CaptureIntegrationTests
